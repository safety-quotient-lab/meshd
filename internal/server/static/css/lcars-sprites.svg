<!-- LCARS SVG sprites — canonical elbow + endcap geometry.
     Source: leonawicz/lcars (MIT + ISC), hmt3design.com.
     Usage: <svg><use href="/css/lcars-sprites.svg#elbow-tl"/></svg> -->
<svg xmlns="http://www.w3.org/2000/svg" style="width:0;height:0;visibility:hidden;position:absolute" aria-hidden="true">
  <!-- Elbows (wide, 300×90 viewBox) -->
  <symbol viewBox="0 0 300 90" id="elbow-lb">
    <path d="M150 90H75C33.58 90 0 56.61 0 15.41V0h150v22.87A37.26 37.26 0 0 0 187.5 60H300v30z"/>
  </symbol>
  <symbol viewBox="0 0 300 90" id="elbow-lt">
    <path d="M150 0H75C33.58 0 0 33.39 0 74.59V90h150V67.13A37.26 37.26 0 0 1 187.5 30H300V0z"/>
  </symbol>
  <!-- Elbows (narrow, 190×90 viewBox) -->
  <symbol viewBox="0 0 190 90" id="elbow-narrow-tl">
    <path d="M150 0H75C33.58 0 0 33.39 0 74.59V90h150V67.13A37.26 37.26 0 0 1 187.5 30H190V0z"/>
  </symbol>
  <symbol viewBox="0 0 190 90" id="elbow-narrow-bl">
    <path d="M150 90H75C33.58 90 0 56.61 0 15.41V0h150v22.87A37.26 37.26 0 0 0 187.5 60H190v30z"/>
  </symbol>
  <!-- Endcaps (pill terminators, 45×30 viewBox) -->
  <symbol viewBox="0 0 45 30" id="endcap-left">
    <path d="M15 30h30V0H15a15 15 0 0 0 0 30z"/>
  </symbol>
  <symbol viewBox="0 0 45 30" id="endcap-right">
    <path d="M30 0H0v30h30a15 15 0 0 0 0-30z"/>
  </symbol>
  <!-- Button (rectangle, 150×60 viewBox) -->
  <symbol viewBox="0 0 150 60" id="button-1">
    <path d="M0 0h150v60H0z"/>
  </symbol>
</svg>
