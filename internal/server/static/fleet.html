<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interagent Mesh — Safety Quotient Lab</title>
    <script type="application/ld+json">
    {
        "@context": ["https://schema.org", {"sqm": "https://interagent.safety-quotient.dev/vocab#"}],
        "@type": "SoftwareApplication",
        "@id": "https://interagent.safety-quotient.dev",
        "name": "safety-quotient-mesh",
        "description": "Federated inter-agent mesh for psychoemotional safety research.",
        "applicationCategory": "Research Infrastructure",
        "provider": { "@type": "Organization", "name": "Safety Quotient Lab" }
    }
    </script>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/layout.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/patterns.css">
    <link rel="stylesheet" href="/static/lcars-theme.css">
</head>
<body>

<div class="lcars-frame">
    <!-- Left spine — segments map to content categories (standard mode) -->
    <div class="lcars-spine" id="lcars-spine">
        <div class="lcars-spine-segment" data-category="transport" style="background: var(--c-transport); flex: 2"></div>
        <div class="lcars-spine-segment" data-category="health" style="background: var(--c-health); flex: 3"></div>
        <div class="lcars-spine-segment" data-category="knowledge" style="background: var(--c-knowledge); flex: 2"></div>
        <div class="lcars-spine-segment" data-category="epistemic" style="background: var(--c-epistemic); flex: 1"></div>
    </div>

    <!-- LCARS Sidebar — professional station names -->
    <nav class="lcars-sidebar" id="lcars-sidebar">
        <div class="lcars-sidebar-cap-top"></div>
        <button class="lcars-sidebar-btn active" data-tab="overview" data-short="OVR" style="background:var(--lcars-accent)" onclick="switchStation('overview')">Overview</button>
        <button class="lcars-sidebar-btn" data-tab="vitals" data-short="VTL" style="background:var(--lcars-medical)" onclick="switchStation('vitals')">Vitals</button>
        <div class="lcars-sidebar-spacer" style="background:var(--lcars-secondary)"></div>
        <button class="lcars-sidebar-btn" data-tab="knowledge" data-short="KNW" style="background:var(--lcars-tertiary)" onclick="switchStation('knowledge')">Knowledge</button>
        <button class="lcars-sidebar-btn" data-tab="analysis" data-short="ANL" style="background:var(--c-tab-science)" onclick="switchStation('analysis')">Analysis</button>
        <div class="lcars-sidebar-spacer" style="background:var(--c-inactive)"></div>
        <button class="lcars-sidebar-btn" data-tab="architecture" data-short="ARC" style="background:var(--c-tab-engineering)" onclick="switchStation('architecture')">Architecture</button>
        <button class="lcars-sidebar-btn" data-tab="transport" data-short="TRN" style="background:var(--c-tab-helm)" onclick="switchStation('transport')">Transport</button>
        <div class="lcars-sidebar-spacer" style="background:var(--c-inactive)"></div>
        <button class="lcars-sidebar-btn" data-tab="governance" data-short="GOV" style="background:var(--lcars-accent)" onclick="switchStation('governance')">Governance</button>
        <button class="lcars-sidebar-btn" data-tab="integrity" data-short="INT" style="background:var(--lcars-alert)" onclick="switchStation('integrity')">Integrity</button>
        <div class="lcars-sidebar-arm"></div>
        <div class="lcars-sidebar-cap-bottom"></div>
    </nav>

    <!-- LCARS Header Band -->
    <div class="lcars-header-band" id="lcars-header-band">
        <div class="lcars-header-seg" style="background:transparent;flex:3;color:var(--lcars-title);font-size:0.95em;letter-spacing:0.12em;justify-content:flex-start">&#x2B21; INTERAGENT MESH</div>
        <div class="lcars-header-seg" style="background:var(--lcars-tertiary);flex:1" id="fleet-hdr-agents">— Agents</div>
        <div class="lcars-header-seg" style="background:var(--lcars-accent);flex:1" id="fleet-hdr-msgs">— Messages</div>
        <div class="lcars-header-seg" style="background:var(--lcars-secondary);flex:1.5" id="fleet-hdr-stardate">SD —</div>
        <div class="lcars-header-seg" style="background:var(--lcars-frame);flex:0.8" id="fleet-hdr-proto">A2A/1.0.0</div>
        <div class="lcars-header-seg" style="background:var(--lcars-highlight);flex:1" id="fleet-hdr-health">&#x25CF; —</div>
    </div>

    <!-- Standard Header (dark/light mode) -->
    <div class="lcars-header">
        <div>
            <span class="lcars-title">&#x2B21; Interagent Mesh</span>
            <span class="lcars-subtitle">Safety Quotient Lab</span>
        </div>
        <div class="lcars-controls">
            <div class="toggle-group">
                <button class="toggle-btn active" id="btn-dark" onclick="setTheme('dark')">Dark</button>
                <button class="toggle-btn" id="btn-light" onclick="setTheme('light')">Light</button>
                <button class="toggle-btn" id="btn-lcars" onclick="setTheme('lcars')">LCARS</button>
            </div>
        </div>
    </div>

    <!-- Tabs (dark/light mode — hidden in LCARS) -->
    <div class="lcars-tabs">
        <button class="lcars-tab active" data-tab="overview" onclick="switchStation('overview')">Overview</button>
        <button class="lcars-tab" data-tab="vitals" onclick="switchStation('vitals')">Vitals</button>
        <button class="lcars-tab" data-tab="knowledge" onclick="switchStation('knowledge')">Knowledge</button>
        <button class="lcars-tab" data-tab="analysis" onclick="switchStation('analysis')">Analysis</button>
        <button class="lcars-tab" data-tab="architecture" onclick="switchStation('architecture')">Architecture</button>
        <button class="lcars-tab" data-tab="transport" onclick="switchStation('transport')">Transport</button>
        <button class="lcars-tab" data-tab="governance" onclick="switchStation('governance')">Governance</button>
        <button class="lcars-tab" data-tab="integrity" onclick="switchStation('integrity')">Integrity</button>
    </div>

    <!-- Content — stations render into these panes -->
    <div class="lcars-content">
        <div class="tab-pane active" id="pane-overview"></div>
        <div class="tab-pane" id="pane-vitals"></div>
        <div class="tab-pane" id="pane-knowledge"></div>
        <div class="tab-pane" id="pane-analysis"></div>
        <div class="tab-pane" id="pane-architecture"></div>
        <div class="tab-pane" id="pane-transport"></div>
        <div class="tab-pane" id="pane-governance"></div>
        <div class="tab-pane" id="pane-integrity"></div>
    </div>

    <!-- Footer Band -->
    <div class="lcars-footer-band">
        <div class="lcars-footer-seg" style="background:var(--lcars-frame);flex:1" id="fleet-footer-status">Mesh Status: —</div>
        <div class="lcars-footer-seg" style="background:var(--lcars-secondary);flex:2" id="fleet-footer-time"></div>
        <div class="lcars-footer-seg" style="background:var(--lcars-tertiary);flex:1" id="fleet-footer-version"></div>
    </div>
</div>

<!-- Shared LCARS library -->
<script src="/static/js/shared/catalog-resolver.js"></script>
<script src="/static/js/shared/patterns.js"></script>
<!-- Fleet chrome + station modules -->
<script src="/static/js/fleet/chrome.js"></script>
<script src="/static/js/fleet/overview.js"></script>
<script src="/static/js/fleet/vitals.js"></script>
<script src="/static/js/fleet/knowledge.js"></script>
<script src="/static/js/fleet/analysis.js"></script>
<script src="/static/js/fleet/architecture.js"></script>
<script src="/static/js/fleet/transport.js"></script>
<script src="/static/js/fleet/governance.js"></script>
<script src="/static/js/fleet/integrity.js"></script>
<script>
// Theme management — restore from localStorage
function setTheme(t) {
    document.body.className = t === 'lcars' ? 'theme-lcars' : t === 'light' ? 'theme-light' : '';
    localStorage.setItem('theme', t);
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.toggle('active', b.id === 'btn-' + t));
}
(function() {
    var t = localStorage.getItem('theme');
    if (t === 'lcars') document.body.classList.add('theme-lcars');
    else if (t === 'light') document.body.classList.add('theme-light');
})();
</script>
</body>
</html>
